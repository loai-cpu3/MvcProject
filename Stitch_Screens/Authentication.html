<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-styles">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
    .left-bg-gradient {
      background: #5b50ed;
    }
    .glass-shape-1 {
      position: absolute;
      top: -30%;
      left: -10%;
      width: 90%;
      height: 90%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }
    .glass-shape-2 {
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }
    .input-field {
      background-color: #f3f4f6;
      border: 1px solid transparent;
      transition: all 0.2s ease-in-out;
    }
    .input-field:focus-within {
      border-color: #6366f1;
      background-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
  </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex text-gray-800 antialiased overflow-hidden">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col md:flex-row w-full h-screen">
<!-- BEGIN: LeftPanel -->
<!-- This section contains the branding, hero text, and background styling -->
<section class="left-bg-gradient relative flex-1 hidden md:flex flex-col justify-between p-12 lg:p-16 text-white overflow-hidden" data-purpose="left-panel">
<!-- Decorative background shapes -->
<div class="glass-shape-1"></div>
<div class="glass-shape-2"></div>
<!-- Top Branding -->
<div class="relative z-10 flex items-center space-x-3">
<div class="w-8 h-8 bg-white/20 rounded flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect height="18" rx="4" stroke-width="2" width="18" x="3" y="3"></rect><path d="M8 10v4m4-6v6m4-2v2" stroke-linecap="round" stroke-width="2"></path></svg></div>
<span class="text-xl font-semibold tracking-wide">Velocity</span>
</div>
<!-- Center Content -->
<div class="relative z-10 max-w-lg mt-16 mb-auto"><h1 class="text-5xl lg:text-6xl font-bold leading-tight mb-6">
          Streamline your<br/>workflow.
        </h1>
<p class="text-lg text-white/70 leading-relaxed font-light">
          Velocity removes the friction of task tracking with an exceptionally clean, spacious interface that highlights progress and blocks out noise.
        </p></div>
<!-- Bottom Carousel Indicators -->
<div class="relative z-10 flex space-x-2 pb-4"><div class="w-8 h-1 bg-white rounded-full"></div>
<div class="w-1 h-1 bg-white/50 rounded-full"></div>
<div class="w-1 h-1 bg-white/50 rounded-full"></div></div>
</section>
<!-- END: LeftPanel -->
<!-- BEGIN: RightPanel -->
<!-- This section contains the login form card -->
<section class="flex-1 flex items-center justify-center p-6 sm:p-12 relative bg-[#fafafa]" data-purpose="right-panel">
<!-- Login Card -->
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 sm:p-10 relative z-10">
<div class="mb-8">
<h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h2>
<p class="text-sm text-[#6b7280]">Enter your details to access your account.</p>
</div>
<!-- Social Login Buttons -->
<div class="space-y-3 mb-6"><button class="w-full flex items-center justify-center py-2.5 px-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200">
<svg class="w-5 h-5 mr-3" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-gray-700">Sign in with Google</span>
</button>
<button class="w-full flex items-center justify-center py-2.5 px-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200">
<svg class="w-5 h-5 mr-3 text-black" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span class="text-sm font-medium text-gray-700">Sign in with Github</span>
</button></div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div>
<div class="input-field rounded-lg flex items-center px-4 py-3">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm text-gray-900 placeholder-gray-400" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="input-field rounded-lg flex items-center px-4 py-3">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm text-gray-900 placeholder-gray-400" id="password" name="password" placeholder="Password" required="" type="password"/>
<button class="text-gray-400 hover:text-gray-600 focus:outline-none ml-2" type="button">
<i class="fa-solid fa-eye-slash"></i>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-2">
<div class="flex items-center">
<input class="h-4 w-4 text-[#5b50ed] focus:ring-[#5b50ed] border-gray-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember-me">
                Remember me
              </label>
</div>
<div class="text-sm">
<a class="font-medium text-[#6366f1] hover:text-[#4f46e5]" href="#">
                Forgot password?
              </a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm text-sm font-medium text-white bg-[#6366f1] hover:bg-[#4f46e5] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#6366f1] transition-colors duration-200 mt-4" type="submit">
              Sign In
            </button>
</div>
</form>
<!-- Sign Up Link -->
<p class="mt-8 text-center text-sm text-gray-600">Don't have an account? 
          <a class="font-medium text-[#6366f1] hover:text-[#4f46e5]" href="#">Create Account</a></p>
</div>
</section>
<!-- END: RightPanel -->
</main>
<!-- END: MainContainer -->
</body></html>
